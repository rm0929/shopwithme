name: shopwithme
services:
  catalog:
    build:
      context: ../../backend/services/catalog
      dockerfile: Dockerfile
    ports:
      - "${CATALOG_PORT:-8081}:8081"
    environment:
      CATALOG_STORAGE: ${CATALOG_STORAGE:-postgres}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-catalog}
      POSTGRES_USER: ${POSTGRES_USER:-catalog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-catalog}
      CATALOG_CORS_ALLOWED_ORIGINS: ${CATALOG_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  cart:
    build:
      context: ../../backend/services/cart
      dockerfile: Dockerfile
    ports:
      - "${CART_PORT:-8082}:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://cart-postgres:5432/${CART_POSTGRES_DB:-cart}
      SPRING_DATASOURCE_USERNAME: ${CART_POSTGRES_USER:-cart}
      SPRING_DATASOURCE_PASSWORD: ${CART_POSTGRES_PASSWORD:-cart}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      cart-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-catalog}
      POSTGRES_USER: ${POSTGRES_USER:-catalog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-catalog}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog -d catalog"]
      interval: 5s
      timeout: 5s
      retries: 5

  cart-postgres:
    image: postgres:16-alpine
    ports:
      - "${CART_POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${CART_POSTGRES_DB:-cart}
      POSTGRES_USER: ${CART_POSTGRES_USER:-cart}
      POSTGRES_PASSWORD: ${CART_POSTGRES_PASSWORD:-cart}
    volumes:
      - cart_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CART_POSTGRES_USER:-cart} -d ${CART_POSTGRES_DB:-cart}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  cart_postgres_data: