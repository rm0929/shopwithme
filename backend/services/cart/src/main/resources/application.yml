server:
  port: 8082

spring:
  application:
    name: cart

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cart}
    username: ${SPRING_DATASOURCE_USERNAME:cart}
    password: ${SPRING_DATASOURCE_PASSWORD:cart}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
  packages-to-scan: com.shopwithme.cart.controller

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
